<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#081a34" />
  <title>守火者 · 古建筑消防智慧管理平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/platform-redesign.css?v=20260426c" />
  <link rel="stylesheet" href="/static/css/immersive-simple.css?v=20260426c" />
  <script>
    window.EXPERIMENT_PROFILE = "{{ experiment_profile | e }}";
    window.SHOW_TECH_DETAILS_DEFAULT = {{ show_tech_details_default | tojson }};
  </script>
</head>
<body>
  <div id="app" class="platform-shell platform-shell--immersive-simple">
    <header class="platform-header">
      <div class="brand-wrap">
        <div class="brand-logo">
          <svg viewBox="0 0 48 48" aria-hidden="true">
            <path d="M24 4 40 10v11c0 10.8-6.7 18.4-16 23-9.3-4.6-16-12.2-16-23V10L24 4Z" fill="none" stroke="currentColor" stroke-width="2.6" />
            <path d="M24 14c4.7 3.4 6.7 6.6 6.1 9.9-.6 3.1-3.1 5.8-6.1 7.3-3-1.5-5.5-4.2-6.1-7.3-.6-3.3 1.4-6.5 6.1-9.9Z" fill="currentColor" opacity=".9" />
          </svg>
        </div>
        <div class="brand-text">
          <div class="brand-heading">
            <div class="brand-wordmark">守火者</div>
            <div class="brand-meta">
              <div class="brand-title">古建筑消防智慧管理平台</div>
              <div class="brand-subtitle">GIS + BIM + 数字孪生 + 实时监测 + AI预警优化</div>
            </div>
          </div>
        </div>
      </div>
      <div class="header-center-clock">
        <div class="header-time-shell">
          <div class="header-clock-value" id="headerTime">--:--:--</div>
        </div>
      </div>
    </header>

    <main class="simple-main-stage">
      <section class="simple-gis-stage" id="mapStage">
        <div class="simple-gis-canvas" id="overviewViewport">
          <div class="simple-gis-world" id="overviewWorld">
            <div class="simple-gis-image" id="mapBaseGrid"></div>

            <button class="simple-building simple-building--yellow" type="button" data-building-id="building_jingxiu">
              <span class="simple-building__label">敬修堂</span>
            </button>
            <button class="simple-building simple-building--red" type="button" data-building-id="building_zhenxing">
              <span class="simple-building__label">振兴堂</span>
            </button>
            <button class="simple-building simple-building--green" type="button" data-building-id="building_wenchang">
              <span class="simple-building__label">文昌阁</span>
            </button>
          </div>
        </div>
      </section>

      <section class="detail-float hidden" id="detailFloatPanel" aria-label="建筑详情悬浮窗">
        <div class="detail-float__header">
          <div>
            <div class="panel-title" id="detailPanelTitle">建筑模型</div>
          </div>
          <button class="platform-ghost-btn" type="button" id="btnBackToOverview">关闭</button>
        </div>
        <div class="detail-float__body">
          <div class="detail-float__model">
            <div class="dt-detail-layer" id="detailLayer" aria-label="建筑详情">
              <div class="dt-model-surface" aria-hidden="true">
                <div class="dt-model-empty">
                  <span class="dt-model-empty__roof"></span>
                  <span class="dt-model-empty__body"></span>
                  <span class="dt-model-empty__base"></span>
                </div>
              </div>
              <div
                class="dt-model-viewport"
                id="twinModelViewport"
                data-model-url="/static/models/qinghe-building.glb"
                data-anchors-url="/static/models/qinghe-building.anchors.json"
                aria-label="建筑三维展示"
              ></div>
              <div class="dt-cam-layer" id="camLayer"></div>
            </div>
          </div>
          <aside class="detail-float__archive">
            <div class="archive-panel-title">建筑档案</div>
            <div class="archive-name" id="buildingArchiveName">--</div>
            <div class="archive-list">
              <div class="archive-row"><span>建造年代</span><strong id="archiveYear">--</strong></div>
              <div class="archive-row"><span>保护等级</span><strong id="archiveProtectionLevel">--</strong></div>
              <div class="archive-row"><span>结构类型</span><strong id="archiveStructureType">--</strong></div>
              <div class="archive-row"><span>建筑面积</span><strong id="archiveArea">--</strong></div>
            </div>
            <div class="archive-keyparts-label">重点保护部位</div>
            <div class="archive-keyparts-value" id="archiveKeyParts">--</div>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <div class="video-modal hidden" id="videoModal" aria-hidden="true">
    <div class="video-modal-content dt-video-float" id="videoModalContent">
      <div class="video-modal-header" id="videoModalDragHandle"><div class="video-modal-title" id="videoModalTitle">实时监控画面</div><button class="video-modal-close" id="videoModalClose" type="button" aria-label="关闭">×</button></div>
      <div class="video-modal-body">
        <div class="video-display"><div class="video-frame" style="border-radius: 0;"><div class="video-wrap" id="videoWrap"><img id="videoImg" alt="stream" /><canvas id="overlay"></canvas></div></div></div>
        <div class="dt-video-side">
          <div class="sidebar-section-title">综合判定</div>
          <div class="lstm-panel">
            <div class="lstm-result"><div class="muted-text" style="font-size: 12px; letter-spacing: 0.2px;">最终告警</div><div class="lstm-status normal" id="finalStatus">-</div><div class="lstm-confidence" id="finalReason">-</div></div>
            <div><div class="sidebar-section-title" style="margin-top: 10px;">现场情况介绍</div><div class="site-intro-card"><div class="site-intro-text" id="siteIntroText">-</div></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/static/js/twin-model.js?v=20260426c"></script>
  <script src="/static/js/demo.js?v=20260426c"></script>
  {% if dev_live_reload %}
  <script>
    (() => {
      let firstMessage = true;
      let sawDisconnect = false;
      let timer = null;

      const connect = () => {
        const source = new EventSource('/__dev__/reload');

        source.onopen = () => {
          if (sawDisconnect) {
            window.location.reload();
            return;
          }
        };

        source.onmessage = () => {
          if (firstMessage) {
            firstMessage = false;
            return;
          }
          window.location.reload();
        };

        source.onerror = () => {
          sawDisconnect = true;
          source.close();
          clearTimeout(timer);
          timer = window.setTimeout(connect, 1200);
        };
      };

      connect();
    })();
  </script>
  {% endif %}
</body>
</html>
